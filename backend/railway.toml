[build]
# Build from the Dockerfile inside backend/.
# In Railway: set the service "Root Directory" to "backend".
builder = "dockerfile"

[deploy]
# Start the bot as a background worker
startCommand = "python src/runner.py"

# Restart automatically on crash — keeps the bot running 24/7
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
